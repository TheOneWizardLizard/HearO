<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HearO - פרוטוקול חירום</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-variant": "#e5e2df",
                        "on-secondary-container": "#796046",
                        "secondary-fixed-dim": "#e1c1a2",
                        "tertiary-fixed-dim": "#accbe0",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#001e2d",
                        "primary": "#416562",
                        "surface-tint": "#416562",
                        "surface-dim": "#ddd9d6",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary": "#725a41",
                        "primary-fixed": "#c3eae7",
                        "surface": "#fdf9f6",
                        "on-tertiary-fixed-variant": "#2d4a5c",
                        "secondary-fixed": "#ffdcbd",
                        "outline": "#717977",
                        "primary-container": "#769b98",
                        "on-primary-fixed-variant": "#294d4a",
                        "surface-container-high": "#ebe7e4",
                        "background": "#fdf9f6",
                        "on-secondary-fixed-variant": "#59422b",
                        "inverse-on-surface": "#f4f0ed",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#103041",
                        "primary-fixed-dim": "#a8cecb",
                        "tertiary-fixed": "#c8e7fd",
                        "on-primary-container": "#0b3230",
                        "inverse-primary": "#a8cecb",
                        "tertiary-container": "#7a98ac",
                        "on-background": "#1c1b1a",
                        "surface-container-low": "#f7f3f0",
                        "on-primary-fixed": "#00201e",
                        "outline-variant": "#c0c8c7",
                        "error-container": "#ffdad6",
                        "secondary-container": "#ffdcbd",
                        "surface-bright": "#fdf9f6",
                        "inverse-surface": "#31302f",
                        "tertiary": "#456275",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f1edea",
                        "on-surface": "#1c1b1a",
                        "on-secondary-fixed": "#291805",
                        "surface-container-highest": "#e5e2df",
                        "on-surface-variant": "#414847",
                        "on-error": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "gutter": "16px",
                        "touch-target": "48px",
                        "safe-margin": "24px",
                        "section-gap": "40px"
                    },
                    fontFamily: {
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "600" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    },
                    animation: {
                        'breathe-circle': 'breathe 8s ease-in-out infinite',
                        'breathe-text': 'breatheText 8s ease-in-out infinite',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { transform: 'scale(1)', opacity: '0.6' },
                            '40%': { transform: 'scale(1.5)', opacity: '1' },
                            '60%': { transform: 'scale(1.5)', opacity: '1' },
                        },
                        breatheText: {
                            '0%, 100%': { opacity: '0.6' },
                            '40%, 60%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Suppressed per "Transactional/Task-Focused" rule, replacing with minimal exit intent) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-surface/40 backdrop-blur-xl transition-all duration-300 ease-in-out shadow-sm shadow-primary/10">
<div class="flex items-center space-x-4 space-x-reverse">
<button aria-label="חזרה לבית" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity rounded-full bg-surface-container-low">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="font-display-lg-mobile text-display-lg-mobile text-primary font-bold tracking-tight">
            HearO
        </div>
<div class="w-touch-target"></div> <!-- Spacer -->
</header>
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-safe-margin px-safe-margin space-y-section-gap w-full max-w-md mx-auto">
<!-- Header Text -->
<div class="text-center space-y-4">
<h1 class="font-headline-md text-headline-md text-primary">פרוטוקול חירום</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
                אתה בטוח. נשום איתנו.
            </p>
</div>
<!-- Breathing Guide -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Outer Pulsing Circle -->
<div class="absolute inset-0 bg-primary-container/30 rounded-full animate-breathe-circle blur-2xl"></div>
<!-- Inner Circle -->
<div class="relative w-32 h-32 bg-primary rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(65,101,98,0.3)] backdrop-blur-sm z-10 transition-transform duration-1000 ease-in-out" id="breathing-circle">
<span class="material-symbols-outlined text-on-primary text-[48px]" data-icon="air" style="font-variation-settings: 'FILL' 1;">air</span>
</div>
<div class="absolute bottom-[-40px] text-center w-full">
<span class="font-body-md text-body-md text-primary font-medium animate-breathe-text" id="breathing-text">
                    שאיפה...
                </span>
</div>
</div>
<!-- Grounding Exercise -->
<div class="w-full bg-surface-container/60 backdrop-blur-2xl rounded-[32px] p-6 shadow-lg shadow-primary/5 flex flex-col items-center text-center space-y-4 mt-12">
<div class="w-12 h-12 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined" data-icon="visibility" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">זהה 3 חפצים סביבך</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                התמקד בכאן ועכשיו. מצא שלושה דברים שאתה יכול לראות בחדר.
            </p>
</div>
<!-- Exit Actions -->
<div class="flex flex-col w-full space-y-4 mt-auto pt-8">
<button class="w-full bg-primary text-on-primary rounded-full py-4 font-body-lg text-body-lg font-medium shadow-md shadow-primary/20 hover:opacity-90 transition-opacity active:scale-[0.98]">
                חזרה לסשן
            </button>
<button class="w-full bg-surface-container-high text-on-surface rounded-full py-4 font-body-lg text-body-lg font-medium hover:bg-surface-variant transition-colors active:scale-[0.98]">
                חזרה לבית
            </button>
</div>
</main>
<script>
        // Simple breathing text logic synced roughly with CSS animation
        const breathingText = document.getElementById('breathing-text');
        const phrases = ['שאיפה...', 'החזק...', 'נשיפה...', 'החזק...'];
        let currentPhase = 0;

        setInterval(() => {
            currentPhase = (currentPhase + 1) % phrases.length;
            breathingText.textContent = phrases[currentPhase];
        }, 4000); // Change text every 4 seconds (half of the 8s animation cycle)
    </script>
</body></html>
