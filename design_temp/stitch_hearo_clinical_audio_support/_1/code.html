<style>
        /* Custom Range Slider Styling for Tactile feel */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #416562; /* primary */
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 4px 12px rgba(65, 101, 98, 0.3);
            border: 2px solid #ffffff;
            transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e5e2df; /* surface-variant */
            border-radius: 4px;
        }
        
        /* SOS Pulse Animation */
        @keyframes sosPulse {
            0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(186, 26, 26, 0); }
            100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
        }
        .sos-btn {
            animation: sosPulse 3s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

<body class="bg-background text-on-background font-body-md antialiased min-h-screen relative overflow-x-hidden">
<!-- Ambient Background Blobs for Soft UI feel -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-container/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
<div class="absolute top-60 -left-20 w-72 h-72 bg-tertiary-container/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-surface/40 dark:bg-surface-dim/40 backdrop-blur-xl shadow-sm shadow-primary/10 transition-all duration-300 ease-in-out">
<button class="text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity p-2 -mr-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary dark:text-primary-fixed ml-auto mr-4">HearO</h1>
</header>
<!-- Main Content Canvas -->

<!-- Header Section -->
<section class="flex flex-col gap-2">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-background">הגדרת סשן</h2>
<p class="font-body-md text-body-md text-on-surface-variant">התאם את הסביבה שלך לרוגע מקסימלי</p>
</section>
<!-- Environment Selection (Bento Grid) -->
<section class="flex flex-col gap-4">
<h3 class="font-headline-md text-headline-md-mobile text-primary">סביבה</h3>
<div class="grid grid-cols-2 gap-4">
<button class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform bg-primary-container/10 border-primary/20">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="local_cafe" style="font-variation-settings: 'FILL' 1;">local_cafe</span>
</div>
<span class="font-label-caps text-label-caps text-on-background">בית קפה</span>
</button>
<button class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="directions_car">directions_car</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">רחוב סואן</span>
</button>
<button class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-1">

</div>

</button>
<button class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">

</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">יער שקט</span>
</button>
</div>
</section>
<!-- Audio Sliders (Tactile Controls) -->
