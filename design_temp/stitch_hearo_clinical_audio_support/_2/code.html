<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>סשן פעיל - HearO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-secondary": "#ffffff",

                        "primary": "#416562",
                        "surface-tint": "#416562",
                        "surface-dim": "#ddd9d6",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary": "#725a41",
                        "primary-fixed": "#c3eae7",
                        "surface": "#fdf9f6",
                        "on-tertiary-fixed-variant": "#2d4a5c",
                        "secondary-fixed": "#ffdcbd",
                        "outline": "#717977",
                        "primary-container": "#769b98",
                        "on-primary-fixed-variant": "#294d4a",
                        "surface-container-high": "#ebe7e4",
                        "background": "#fdf9f6",
                        "on-secondary-fixed-variant": "#59422b",
                        "inverse-on-surface": "#f4f0ed",

                        "tertiary-fixed": "#c8e7fd",
                        "on-primary-container": "#0b3230",
                        "inverse-primary": "#a8cecb",
                        "tertiary-container": "#7a98ac",
                        "on-background": "#1c1b1a",
                        "surface-container-low": "#f7f3f0",
                        "on-primary-fixed": "#00201e",
                        "outline-variant": "#c0c8c7",
                        "error-container": "#ffdad6",
                        "secondary-container": "#ffdcbd",
                        "surface-bright": "#fdf9f6",
                        "inverse-surface": "#31302f",
                        "tertiary": "#456275",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f1edea",
                        "on-surface": "#1c1b1a",
                        "on-secondary-fixed": "#291805",
                        "surface-container-highest": "#e5e2df",
                        "on-surface-variant": "#414847",
                        "on-error": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "gutter": "16px",
                        "touch-target": "48px",
                        "safe-margin": "24px",
                        "section-gap": "40px"
                    },
                    fontFamily: {
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "display-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "600" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "500" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],

                        "display-lg-mobile": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom Animations for Adaptive Tranquility */
        @keyframes breathe-cycle {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.1;
            }
        }

        .animate-breathe {
            animation: breathe-cycle 4s ease-in-out infinite;
        }

        .animate-breathe-delayed {
            animation: breathe-cycle 4s ease-in-out 1s infinite;
        }

        @keyframes soft-pulse {
            0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(186, 26, 26, 0); }
            100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
        }

        .animate-sos-pulse {
            animation: soft-pulse 3s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-hidden min-h-screen relative flex flex-col">
<!-- Atmospheric Background Image -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 blur-sm" data-alt="A highly detailed, serene, atmospheric, slightly out-of-focus view of a lush, quiet forest bathed in soft, diffused morning light. The image features a bright, clean light-mode aesthetic with gentle sea foam green and misty blue undertones. The composition is highly minimalist and uncluttered, intended to evoke a deep sense of calm and therapeutic safety, acting as a gentle backdrop without drawing sharp focus away from the foreground elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVZXPExsqWiK0FsD3Dsikr9FwsFQjBbuqDQ5JJsyp4qnUBALTJZBRbnnl6cVKoAMdnNOgkbz-gjlaN6p5vNSSYJ9Yr5w01xbdY-1z0jQNCyRzVeYIHVFwTIgD1--jOuF-0SYHehfn00-LcJF3Hk4oJBG2QsCsVHmUgBwvqK_svJ9mn1fLwCvPvV3W5uo-cxMnz_TwkiNzECVxr7_7MeiogymEWUVvCMijF7nemC9YvVuaYktiPZtEpUfcgTITWyFe_s7XA60ECtKNu"/>
<div class="absolute inset-0 bg-surface/70 backdrop-blur-md"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-surface/30"></div>
</div>
<!-- TopAppBar (from JSON) -->
<!-- Applying conflict resolution: Exact JSON styling injected -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-surface/40 dark:bg-surface-dim/40 backdrop-blur-xl shadow-sm shadow-primary/10 transition-all duration-300 ease-in-out">
<!-- Back action implies returning, consistent with task-focus suppression of main nav -->
<button aria-label="חזור" class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity flex items-center justify-center w-touch-target h-touch-target rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary dark:text-primary-fixed tracking-tight font-bold">
            HearO
        </h1>
<div class="w-touch-target"></div> <!-- Spacer for perfect centering -->
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col justify-between pt-24 pb-8 px-safe-margin max-w-md mx-auto w-full h-screen">
<!-- Clinical Phase Indicator -->
<section class="w-full mb-8">
<div class="flex items-center justify-between bg-surface-container-low/60 backdrop-blur-xl p-2 rounded-2xl shadow-[0_8px_30px_rgba(65,101,98,0.05)]">
<!-- Phase 1 -->
<div class="flex-1 flex flex-col items-center justify-center px-1">
<div class="w-full h-1.5 rounded-full bg-outline-variant mb-2"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant truncate w-full text-center">שלב 1: הכנה</span>
</div>
<!-- Phase 2 -->
<div class="flex-1 flex flex-col items-center justify-center px-1">
<div class="w-full h-1.5 rounded-full bg-outline-variant mb-2"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant truncate w-full text-center">שלב 2: הדרכה</span>
</div>
<!-- Phase 3 (Active) -->
<div class="flex-1 flex flex-col items-center justify-center px-1">
<div class="w-full h-1.5 rounded-full bg-primary mb-2 shadow-[0_0_12px_rgba(65,101,98,0.4)]"></div>
<span class="font-label-caps text-label-caps text-primary font-bold truncate w-full text-center">שלב 3: חשיפה</span>
</div>
<!-- Phase 4 -->
<div class="flex-1 flex flex-col items-center justify-center px-1">
<div class="w-full h-1.5 rounded-full bg-outline-variant/30 mb-2"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant/50 truncate w-full text-center">שלב 4: סיכום</span>
</div>
</div>
</section>
<!-- Central Breathing Guide & Timer -->
<section class="flex-1 flex flex-col items-center justify-center relative my-section-gap">
<!-- Visual Breathing Guide (Expanding Waves) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="absolute w-48 h-48 bg-primary-container rounded-full opacity-50 animate-breathe blur-md"></div>
<div class="absolute w-64 h-64 bg-primary-fixed-dim rounded-full opacity-30 animate-breathe-delayed blur-lg"></div>
</div>
<!-- Central Timer -->
<div class="relative z-10 flex flex-col items-center justify-center bg-surface/80 backdrop-blur-2xl rounded-full w-56 h-56 shadow-[0_10px_40px_rgba(65,101,98,0.15)] border border-surface-container-highest/50">
<span class="font-label-caps text-label-caps text-on-surface-variant tracking-widest mb-1">זמן נותר</span>
<div class="font-display-lg text-display-lg text-primary tracking-tighter" style="font-variant-numeric: tabular-nums;">
                    04:30
                </div>
</div>
</section>
<!-- Bottom Controls & Actions Area -->
<section class="flex flex-col gap-6 w-full mt-auto">
<!-- Real-time Audio Panel & Play Controls -->
<div class="bg-surface-container-lowest/80 backdrop-blur-2xl rounded-[32px] p-6 shadow-xl shadow-primary/5 flex items-center justify-between border border-surface-container-high/30">
<!-- Mute/Muffle Toggle -->
<button aria-label="השתק" class="flex flex-col items-center justify-center gap-1.5 w-touch-target group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">volume_off</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">השתק</span>
</button>
<!-- Primary Play/Pause -->
<button aria-label="השהה" class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-surface-tint flex items-center justify-center text-on-primary shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-[36px]" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<!-- Volume Level / Muffle Info -->
<button aria-label="סינון רעשים" class="flex flex-col items-center justify-center gap-1.5 w-touch-target group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-surface-container-high transition-colors duration-300 relative overflow-hidden">
<span class="material-symbols-outlined relative z-10" style="font-variation-settings: 'FILL' 0;">hearing</span>
<!-- Liquid fill indicator -->
<div class="absolute bottom-0 left-0 right-0 h-1/2 bg-primary-container opacity-40"></div>
</div>
<span class="font-label-caps text-label-caps text-primary">סינון</span>
</button>
</div>
<!-- Bottom Action Row -->
<div class="flex items-center justify-between w-full px-2 gap-4">
<!-- End Session Button -->
<button class="flex-1 h-14 bg-surface-container rounded-full flex items-center justify-center gap-2 text-on-surface hover:bg-surface-container-high active:bg-surface-container-highest transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">stop_circle</span>
<span class="font-body-lg text-body-lg font-medium">סיום</span>
</button>
<!-- SOS Button (Prominent, Tactile, Rhythmic Pulse) -->
<button class="h-14 px-8 bg-error rounded-full flex items-center justify-center gap-2 text-on-error shadow-lg shadow-error/20 animate-sos-pulse hover:bg-on-error-container transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-body-lg text-body-lg font-medium">SOS</span>
</button>
</div>
</section>
</main>
</body></html>
